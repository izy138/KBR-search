services:
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: ./backend
    container_name: kbr-backend
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_INDEX=project_data
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2  # 384-d; must match indexed embeddings
      # Embedding device: auto (CPU in this image) | cuda | mps — GPU needs a CUDA-capable torch build / image.
      - EMBEDDING_DEVICE=auto
      - HF_HOME=/root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - huggingface-cache:/root/.cache/huggingface

      - ./backend/2020_data.csv:/app/2020_data.csv:ro
      - ./backend/2021_data.csv:/app/2021_data.csv:ro
      - ./backend/2022_data.csv:/app/2022_data.csv:ro
      - ./backend/2023_data.csv:/app/2023_data.csv:ro
      - ./backend/2024_data.csv:/app/2024_data.csv:ro
      - ./backend/2025_data.csv:/app/2025_data.csv:ro
    depends_on:
      opensearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: kbr-frontend
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  opensearch-data:
  huggingface-cache:
